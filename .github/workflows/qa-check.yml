name: YSY QA Browser Check

on:
  workflow_dispatch:

jobs:
  browser-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install packages
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run test
        run: npm test
